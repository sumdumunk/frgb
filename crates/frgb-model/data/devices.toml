# ==========================================================================
# Non-fan Lian Li devices (keyed by dev_type, stored as fans_type for uniformity)
# ==========================================================================
# These use a synthetic fans_type = 100 + dev_type to avoid collision with
# actual fans_type bytes. The controller maps dev_type→fans_type during discovery.

# WaterBlock (dev_type 10) — pump head with RGB ring. LED count: 24 base + 24 per fan.
# max_rpm here matches `frgb_protocol::pump::PUMP_MAX_RPM_CIRCLE` — the value
# `pct_to_rpm(Circle, 100)` actually commands. Hardware reaches this on
# HydroShift II Circle (measured 2526 RPM at 100% commanded speed).
# May be upgraded to HydroShiftII at runtime if LCD device is present.
[[device]]
fans_type = 110
name = "WaterBlock"
kind = "pump"
device_type = "WaterBlock"
dev_types = [10]
max_rpm = 2500
physical_leds = 24
virtual_leds = 48
inner_leds = 24
is_reverse = false
has_lcd = false
capabilities = ["rpm_read", "speed_ctrl", "rgb"]

# WaterBlock 2 (dev_type 11) — same as WaterBlock, different hardware revision.
# max_rpm matches `frgb_protocol::pump::PUMP_MAX_RPM_SQUARE`.
[[device]]
fans_type = 111
name = "WaterBlock 2"
kind = "pump"
device_type = "WaterBlock2"
dev_types = [11]
max_rpm = 3200
physical_leds = 24
virtual_leds = 48
inner_leds = 24
is_reverse = false
has_lcd = false
capabilities = ["rpm_read", "speed_ctrl", "rgb"]

