# frgb device specifications
#
# Embedded default: crates/frgb-model/data/devices.toml
# User override:    ~/.config/frgb/devices.toml (merged by key)
#
# Each [[device]] entry defines static hardware characteristics.
# The key field determines how the device is identified:
#   fans_type     = Lian Li RF fans_type byte from discovery
#   hwmon_name    = hwmon chip name (sysfs)
#   usb_vid/pid   = USB vendor/product ID
#
# LED counts:
#   physical_leds = actual LEDs on the hardware
#   virtual_leds  = firmware virtual buffer size per fan (used for TUZ encoding)
#   inner_leds    = LEDs in the inner/center zone

# ==========================================================================
# Lian Li wireless fans — keyed by fans_type byte
# ==========================================================================

# --- SL V3 (fans_type 20-22) ---

[[device]]
fans_type = 20
name = "SL"
kind = "fan"
device_type = "SlWireless"
size_mm = 120
max_rpm = 2000
cfm = 64.05
noise_dba = 28.0
physical_leds = 21
virtual_leds = 40
inner_leds = 8
is_reverse = false
has_lcd = false
capabilities = ["rpm_read", "speed_ctrl", "rgb", "cfm"]

